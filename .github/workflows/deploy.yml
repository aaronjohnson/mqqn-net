name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Verify site URLs are reachable
        run: |
          urls=$(grep -roh 'https://[a-zA-Z0-9._-]*\.mqqn\.net' public/ | sort -u)
          failed=0
          for url in $urls; do
            status=$(curl -o /dev/null -s -w '%{http_code}' --max-time 10 "$url") || status="000"
            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "OK ($status): $url"
            else
              echo "FAIL ($status): $url"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more site URLs are not reachable"
            exit 1
          fi
